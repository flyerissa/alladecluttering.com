<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alla Decluttering & Wardrobe · Fishers, IN</title>
  <meta name="description" content="Home decluttering, organization systems & personal wardrobe styling in Fishers, Indiana. Helping women create calm homes and closets they love.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    : root {
      --green:       #0E3845;
      --green-mid:   #1A4D5C;
      --green-light: #E0EEF0;
      --gold:        #C9A84C;
      --gold-light:  #E2C06A;
      --cream:       #F5EDD8;
      --cream-soft:  #FAF7F2;
      --text:        #091E26;
      --text-muted:  #5A7060;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--cream-soft);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── NOISE TEXTURE OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.4;
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      background: var(--green);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 60px 100px;
      overflow: hidden;
    }

    .hero-bar {
      position: absolute;
      top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(to right, var(--gold), var(--gold-light) 40%, transparent);
    }

    .hero-inner {
      max-width: 900px;
      position: relative; z-index: 1;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 1s ease forwards 0.2s;
    }

    .hero-eyebrow {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 24px;
    }

    .hero-name {
      font-family: 'Lora', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(72px, 10vw, 120px);
      line-height: 0.9;
      color: var(--cream);
      margin-bottom: 20px;
    }

    .hero-title {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: clamp(13px, 2vw, 16px);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.85);
      margin-bottom: 8px;
    }

    .hero-divider {
      display: flex;
      align-items: center;
      gap: 0;
      width: 100%;
    }
    .hero-divider-line { flex: 1; height: 1px; background: var(--gold); opacity: 0.7; }
    .hero-divider-dot  { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; margin-left: 4px; }

    .hero-services {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 40px 0 56px;
    }

    .service-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 40px;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--cream);
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 32px;
      background: var(--gold);
      color: var(--green);
      font-family: 'Jost', sans-serif;
      font-weight: 500;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    /* ── ABOUT & SERVICES ── */
    .about, .services, .portfolio, .process, .contact {
      padding: 100px 60px;
    }

    .inner-width { max-width: 900px; margin: 0 auto; }

    .section-label {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
    }

    .section-heading {
      font-family: 'Lora', serif;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.2;
      margin-bottom: 40px;
    }

    /* ── PORTFOLIO GRID ── */
    .portfolio { background: var(--cream-soft); }
    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .portfolio-item {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      cursor: pointer;
      background: #eee;
    }
    .portfolio-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }
    .portfolio-item:hover img { transform: scale(1.05); }
    
    /* Overlay effect */
    .portfolio-item::after {
      content: 'View Details';
      position: absolute; inset: 0;
      background: rgba(14, 56, 69, 0.7);
      display: flex; align-items: center; justify-content: center;
      color: var(--gold);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .portfolio-item:hover::after { opacity: 1; }

    /* ── LIGHTBOX ── */
    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(9, 30, 38, 0.95);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    #lightbox img {
      max-width: 100%;
      max-height: 90vh;
      box-shadow: 0 10px 50px rgba(0,0,0,0.5);
    }
    #lightbox-close {
      position: absolute;
      top: 30px; right: 30px;
      color: var(--cream);
      font-size: 30px;
      cursor: pointer;
    }

    /* ── SERVICES GRID ── */
    .services { background: var(--green); color: var(--cream); }
    .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
    .service-card {
      background: rgba(255,255,255,0.04);
      padding: 40px 36px;
      border: 1px solid rgba(201,168,76,0.12);
    }

    /* ── PROCESS ── */
    .process-steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 60px; }
    .step-num {
      width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--gold);
      display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
      font-family: 'Lora', serif; font-style: italic; color: var(--gold);
    }

    /* ── CONTACT ── */
    .contact { background: var(--green); color: var(--cream); text-align: center; }
    .contact-btn {
      display: inline-block; padding: 18px 40px; border: 1px solid var(--gold);
      color: var(--gold); text-decoration: none; margin-top: 30px;
    }

    footer { background: #091E26; padding: 24px 60px; display: flex; justify-content: space-between; color: rgba(201,168,76,0.3); font-size: 11px; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    .reveal { opacity: 0; transform: translateY(20px); transition: 0.7s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    @media (max-width: 768px) {
      .hero, .about, .services, .portfolio, .process, .contact { padding: 60px 24px; }
      .portfolio-grid { grid-template-columns: 1fr 1fr; }
      .services-grid, .process-steps { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<section class="hero">
  <div class="hero-bar"></div>
  <div class="hero-inner">
    <p class="hero-eyebrow">Fishers, Indiana</p>
    <h1 class="hero-name">Alla</h1>
    <div
